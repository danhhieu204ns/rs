<svg width="1400" height="560" viewBox="0 0 1400 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748B"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #475569; }
      .section { font: 700 16px Arial, sans-serif; fill: #0F172A; }
      .label { font: 700 15px Arial, sans-serif; fill: #0F172A; }
      .text { font: 400 13px Arial, sans-serif; fill: #334155; }
      .small { font: 400 12px Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="1400" height="560" rx="28" fill="url(#bg)"/>

  <text x="60" y="56" class="title">HRS-IU-DL Pipeline</text>
  <text x="60" y="82" class="subtitle">MovieLens 100K - Hybrid recommendation workflow used in this repository</text>

  <rect x="60" y="140" width="170" height="90" rx="18" fill="#DBEAFE" stroke="#60A5FA" filter="url(#shadow)"/>
  <text x="145" y="175" text-anchor="middle" class="label">Input Data</text>
  <text x="145" y="198" text-anchor="middle" class="text">MovieLens 100K</text>

  <rect x="280" y="120" width="220" height="130" rx="18" fill="#E2E8F0" stroke="#94A3B8" filter="url(#shadow)"/>
  <text x="390" y="155" text-anchor="middle" class="label">Phase A: Preprocessing</text>
  <text x="390" y="183" text-anchor="middle" class="text">Clean ratings and metadata</text>
  <text x="390" y="205" text-anchor="middle" class="text">Build item genres_text</text>
  <text x="390" y="227" text-anchor="middle" class="text">Train/test split 80/20</text>

  <rect x="560" y="70" width="220" height="84" rx="18" fill="#F3E8FF" stroke="#A855F7" filter="url(#shadow)"/>
  <text x="670" y="102" text-anchor="middle" class="label">Phase B: CF</text>
  <text x="670" y="126" text-anchor="middle" class="text">SVD + Item-based cosine</text>

  <rect x="560" y="174" width="220" height="84" rx="18" fill="#D1FAE5" stroke="#10B981" filter="url(#shadow)"/>
  <text x="670" y="206" text-anchor="middle" class="label">Phase C: CBF</text>
  <text x="670" y="230" text-anchor="middle" class="text">Title + genres, TF-IDF</text>

  <rect x="560" y="278" width="220" height="84" rx="18" fill="#FFEDD5" stroke="#F59E0B" filter="url(#shadow)"/>
  <text x="670" y="310" text-anchor="middle" class="label">Phase D: NCF</text>
  <text x="670" y="334" text-anchor="middle" class="text">User/item embeddings</text>

  <rect x="560" y="382" width="220" height="84" rx="18" fill="#FCE7F3" stroke="#EC4899" filter="url(#shadow)"/>
  <text x="670" y="414" text-anchor="middle" class="label">Phase E: RNN</text>
  <text x="670" y="438" text-anchor="middle" class="text">Sequential user history</text>

  <rect x="870" y="174" width="240" height="132" rx="18" fill="#DCFCE7" stroke="#22C55E" filter="url(#shadow)"/>
  <text x="990" y="208" text-anchor="middle" class="label">Phase F: Weighted Fusion</text>
  <text x="990" y="234" text-anchor="middle" class="text">Combine 5 scores:</text>
  <text x="990" y="258" text-anchor="middle" class="small">alpha*SVD + beta*ItemCF + gamma*CBF</text>
  <text x="990" y="279" text-anchor="middle" class="small">+ delta*NCF + epsilon*RNN</text>

  <rect x="1180" y="174" width="170" height="132" rx="18" fill="#FEE2E2" stroke="#EF4444" filter="url(#shadow)"/>
  <text x="1265" y="208" text-anchor="middle" class="label">Phase G</text>
  <text x="1265" y="234" text-anchor="middle" class="text">Evaluation</text>
  <text x="1265" y="256" text-anchor="middle" class="small">RMSE, MAE,</text>
  <text x="1265" y="276" text-anchor="middle" class="small">Precision, Recall</text>
  <text x="1265" y="296" text-anchor="middle" class="small">+ weight tuning</text>

  <line x1="230" y1="185" x2="280" y2="185" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="500" y1="185" x2="560" y2="112" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="500" y1="185" x2="560" y2="216" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="500" y1="185" x2="560" y2="320" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="500" y1="185" x2="560" y2="424" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>

  <line x1="780" y1="112" x2="870" y2="206" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="780" y1="216" x2="870" y2="226" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="780" y1="320" x2="870" y2="246" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="780" y1="424" x2="870" y2="266" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>

  <line x1="1110" y1="240" x2="1180" y2="240" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="60" y="520" class="subtitle">Outputs: branch score files in reports/, fused predictions, tuned weights, and final evaluation metrics.</text>
</svg>
